{% extends 'base.html' %}

{% block page_title %}找回用户名{% endblock %}

{% block content %}
<style>
.forgot-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
    padding: 2rem 1rem;
}

.forgot-card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    padding: 2.5rem;
}
</style>

<div class="forgot-container">
    <div class="forgot-card">
        <h1 class="login-title">找回用户名</h1>
        <p class="login-subtitle">通过邮箱找回用户名（更安全，不在页面直接显示）</p>

        <form method="POST" action="{{ url_for('quickform.forgot_username') }}">
            <div class="mb-3">
                <label for="account" class="form-label" style="font-weight: 600; color: #111827;">手机号或邮箱</label>
                <input type="text" class="form-control" id="account" name="account" required placeholder="例如：13800138000 或 teacher@example.com" style="padding: 0.75rem;">
                <div class="form-text">优先推荐填邮箱：若邮箱存在，我们会把用户名发送到您的邮箱；页面不会直接显示结果。</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" style="font-weight: 500; font-size: 1rem;">查询用户名</button>
        </form>

        <div class="mt-4 text-center">
            <p style="color: #6b7280; margin: 0;">
                已记起用户名？
                <a href="{{ url_for('quickform.login') }}" style="color: #0d9488; text-decoration: none; font-weight: 500;">返回登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
