<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>服务器维护中 · {{ (system_config.system_name if system_config else 'QuickForm') }}{% if app_version %} · v{{ app_version }}{% endif %}</title>
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
  <style>
    body { background: #f8fafc; }
    .qf-wrap { max-width: 860px; margin: 8vh auto; padding: 0 1rem; }
    .qf-card {
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.10);
      background: #fff;
    }
    .qf-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .35rem .6rem;
      border-radius: 999px;
      background: rgba(37,99,235,.10);
      color: #1d4ed8;
      font-weight: 700;
      font-size: .875rem;
    }
    .qf-links a { text-decoration: none; margin-right: .9rem; }
    .qf-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="qf-wrap">
    <div class="qf-card p-4 p-md-5">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <div class="qf-badge">服务器维护中</div>
        <div class="text-muted small">预计在数分钟后重启</div>
      </div>
      <h3 class="mb-2">服务器维护中，预计在数分钟后重启，您可以：</h3>
      <p class="text-muted mb-4">当前正在进行数据库加载/迁移等初始化操作。你可以先查看文档或使用 CLI，稍后刷新页面即可恢复。</p>

      <div class="qf-links mb-3">
        <a href="https://quickform.cn" target="_blank" rel="noopener">QuickForm官方网站</a>
        <a href="{{ url_for('quickform.cli_doc') }}">CLI</a>
        <a href="https://github.com/quickform_school" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ url_for('quickform.index') }}#about">关于我们</a>
        <a href="https://my.feishu.cn/docx/KYlJdyq3wojmwox8KJTcnKORnob" target="_blank" rel="noopener">免责声明</a>
      </div>

      <div class="d-flex gap-2 flex-wrap mt-3">
        <button class="btn btn-primary" type="button" onclick="window.location.reload()">刷新重试</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('quickform.index') }}">回到首页</a>
      </div>
    </div>
  </div>
</body>
</html>
